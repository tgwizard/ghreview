name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Actions pinned to commit SHAs (tags are mutable; SHAs can't move).
      # Refresh with `git ls-remote --tags https://github.com/actions/<name>`.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
      # `npm ci` enforces the committed package-lock.json exactly and fails
      # if any dependency resolves to a different hash.
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      - run: |
          test -s dist/cli.js
          head -1 dist/cli.js | grep -q '^#!/usr/bin/env node'
