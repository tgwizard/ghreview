name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Actions pinned to commit SHAs (tags are mutable; SHAs can't move).
      # Refresh with `git ls-remote --tags https://github.com/actions/<name>`.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
      # `npm ci` enforces the committed package-lock.json exactly and fails
      # if any dependency resolves to a different hash.
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      - run: |
          test -s dist/cli.js
          head -1 dist/cli.js | grep -q '^#!/usr/bin/env node'
